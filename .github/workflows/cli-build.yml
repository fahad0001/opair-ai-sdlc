name: cli-build
on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli-build.yml"
  pull_request:
    paths:
      - "cli/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli-build.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run cli:build
      - run: npm run cli:test
      - name: pack (dry-run)
        run: npm pack -w @opair/ai-sdlc --dry-run
