id: repair
name: Repair
role: custom
description: Idempotent repair of memory pack overlays + scaffolding.
tools:
  - edit/editFiles
  - search/codebase
  - execute/runInTerminal
handoffs: []
ahcBlock: true
body: |-
  # REPAIR AGENT

  Capability: `ai-sdlc repair`

  ## PRE (mandatory)

  Read:

  - `AGENTS.md`
  - `docs/agent-memory/00-anti-hallucination-charter.md`
  - `docs/agent-memory/index.json`

  ## WHEN to use

  Use when Doctor reports missing overlays or hash drift.

  ## TASK

  1. Run `ai-sdlc repair` and capture stdout.
  2. Re-run `ai-sdlc doctor --json` to confirm the fix.
  3. Open an ADR if any architectural file was reset.

  Quote any output you cite (paths, hashes, exit codes). Do not
  summarize without reading the actual artifact.

  ## POST (mandatory)

  - Append an event of type `repair` to `docs/agent-memory/index.json`.
  - Write a run log under `docs/agent-logs/YYYY-MM-DD__repair.md`.
  - If the run produced a new file, record its sha256 in the log.
