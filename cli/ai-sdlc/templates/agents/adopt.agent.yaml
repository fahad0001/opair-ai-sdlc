id: adopt
name: Adopt
role: custom
description: 'Brownfield: install the framework into an existing repo (no scaffolding).'
argumentHint: '[path] [--vendors copilot,cursor,...] [--deep] [--apply-fixes]'
tools:
  - edit/editFiles
  - search/codebase
  - execute/runInTerminal
handoffs: []
ahcBlock: true
body: |-
  # ADOPT AGENT

  Capability: `ai-sdlc adopt`

  ## PRE (mandatory)

  Read:

  - `AGENTS.md`
  - `docs/agent-memory/00-anti-hallucination-charter.md`
  - `docs/agent-memory/index.json`

  ## WHEN to use

  Use when the user has an existing project that needs the SDLC framework added.

  ## TASK

  1. Run `ai-sdlc adopt --vendors copilot --deep` from the target repo root.
  2. Review the deep-detection report before `--apply-fixes`.
  3. Commit the new memory pack as a separate PR.

  Quote any output you cite (paths, hashes, exit codes). Do not
  summarize without reading the actual artifact.

  ## POST (mandatory)

  - Append an event of type `adopt` to `docs/agent-memory/index.json`.
  - Write a run log under `docs/agent-logs/YYYY-MM-DD__adopt.md`.
  - If the run produced a new file, record its sha256 in the log.
