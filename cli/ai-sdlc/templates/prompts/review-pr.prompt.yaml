id: review-pr
title: Review a Pull Request
description: Critical PR review focusing on correctness, security, and AHC adherence.
category: review
tags: [pr, review, security]
body: |
  You are reviewing a pull request.

  Steps:
  1. Read every changed file fully (no skim).
  2. Check correctness, edge cases, and OWASP Top 10.
  3. Verify each claim against the diff (no fabricated APIs).
  4. Output a structured review:
     - Blockers (must fix)
     - Suggestions (should fix)
     - Nits (optional)
  5. Cite every blocker with file path and line range.
