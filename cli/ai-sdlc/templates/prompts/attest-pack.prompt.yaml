id: attest-pack
title: attest-pack
description: Produce a signed attestation over a context-pack (in-toto style).
category: sdlc
body: |-
  You are running the `ai-sdlc attest-pack` capability.

  Inputs:
  ${input}

  Rules:

  - Follow `AGENTS.md` and `docs/agent-memory/00-anti-hallucination-charter.md`.
  - Run the CLI command exactly; do not paraphrase its output.
  - Cite any file paths or hashes you produce.

  Steps:

  1. Run `ai-sdlc attest-pack --pack <path>`.
  2. Store the resulting `.att.json` next to the pack.
  3. Verify locally with `ai-sdlc provenance-verify` before publishing.

  When to invoke: the team requires signed provenance for shipped artifacts.
