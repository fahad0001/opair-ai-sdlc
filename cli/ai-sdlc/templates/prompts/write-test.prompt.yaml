id: write-test
title: Write a Test
description: Generate a focused test for the selected behavior.
category: test
tags: [tests, vitest, pytest]
body: |
  Generate a single, deterministic test for the selected code.

  Constraints:
  - Use the project's existing test framework (do not introduce a new one).
  - Each assertion must be specific (no `truthy`-style asserts unless justified).
  - Cover one behavior per test; arrange-act-assert.
  - For boundary inputs, add an explicit case.
