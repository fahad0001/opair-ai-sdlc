id: explain-code
title: Explain Selected Code
description: Produce a precise, evidence-backed explanation.
category: docs
tags: [docs, explain]
body: |
  Explain the selected code precisely.

  Required:
  - State what the code does in one sentence.
  - List inputs, outputs, side-effects.
  - Identify error paths and failure modes.
  - Cite the exact lines for any claim.
  - If something is unclear or implementation-defined, say "unknown" — do not guess.
