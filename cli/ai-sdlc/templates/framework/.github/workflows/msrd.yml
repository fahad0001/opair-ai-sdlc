name: MSRD

on:
  push:
    branches: [main]
    paths:
      - "docs/agent-memory/**"
      - ".github/workflows/msrd.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  msrd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Generate MSRD digest
        run: npx --yes ai-sdlc msrd --out docs/agent-memory/msrd.md
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/agent-memory/msrd.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/agent-memory/msrd.md
            git commit -m "chore(memory): refresh MSRD digest [skip ci]"
            git push
          else
            echo "No MSRD changes."
          fi
